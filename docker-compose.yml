services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
       - ./backend:/backend
       - /backend/node_modules

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
       - ./frontend:/frontend
       - /frontend/node_modules